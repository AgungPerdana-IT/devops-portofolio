services:
  app:
    build: .
    container_name: portfolio-app
    ports:
      - "${APP_PORT:-5000}:5000"   # host:container
    env_file:
      - .env
    volumes:
      - app-logs:/app/logs         # persist logs across restarts
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  app-logs:
    driver: local